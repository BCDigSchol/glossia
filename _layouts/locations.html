---
layout: page
---

{{ content }}

<input
  type="text"
  id="location-search"
  placeholder="Search locations..."
  style="margin-bottom: 1em; padding: 0.5em; width: 100%; max-width: 400px;"
/>

<ul class="flex flex-wrap gap-3 my-6 list-none" id="locations-list">
  {% assign sorted_locations = site.data.locations | sort: "title" %}
  {% for location in sorted_locations %}
    <li data-name="{{ location.title | downcase }}">
      <a href="{{ '/location/' | append: location.id | relative_url }}"
         class="inline-block bg-gray-100 border border-gray-300 rounded-full px-4 py-2 text-sm font-semibold text-gray-700 shadow hover:bg-gray-200 hover:text-blue-700 transition">
        {{ location.title }}
      </a>
    </li>
  {% endfor %}
</ul>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const searchInput = document.getElementById('location-search');
  const items = document.querySelectorAll('#locations-list li');

  searchInput.addEventListener('input', function() {
    const query = this.value.trim().toLowerCase();
    items.forEach(item => {
      const name = item.getAttribute('data-name');
      if (name.includes(query)) {
        item.style.display = '';
      } else {
        item.style.display = 'none';
      }
    });
  });
});
</script>
