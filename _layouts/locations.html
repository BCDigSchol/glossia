---
layout: page
---

{{ content }}

<input
  type="text"
  id="location-search"
  placeholder="Search locations..."
  style="margin-bottom: 1em; padding: 0.5em; width: 100%; max-width: 400px;"
/>

<div class="grid grid-cols-3 gap-4" id="locations-grid">
  {% for location in site.data.locations %}
    <div class="grid-item border border-solid rounded-lg text-center" data-name="{{ location.title | downcase }}">
      <a href="/location/{{ location.id }}/">
        <h3>{{ location.title }}</h3>
      </a>
    </div>
  {% endfor %}
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const searchInput = document.getElementById('location-search');
  const items = document.querySelectorAll('#locations-grid .grid-item');

  searchInput.addEventListener('input', function() {
    const query = this.value.trim().toLowerCase();
    items.forEach(item => {
      const name = item.getAttribute('data-name');
      if (name.includes(query)) {
        item.style.display = '';
      } else {
        item.style.display = 'none';
      }
    });
  });
});
</script>
