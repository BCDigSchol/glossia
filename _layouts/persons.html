---
layout: page
---

{{ content }}

<input
  type="text"
  id="person-search"
  placeholder="Search people..."
  style="margin-bottom: 1em; padding: 0.5em; width: 100%; max-width: 400px;"
/>

<ul class="flex flex-wrap gap-3 my-6 list-none item-list-wrap" id="people-list">
  {% assign sorted_persons = site.data.persons | sort: "short_name" %}
  {% for person in sorted_persons %}
    <li data-name="{{ person.full_name | downcase }}">
      <a href="{{ '/person/' | append: person.id | relative_url }}"
         class="inline-block bg-gray-100 border border-gray-300 rounded-full px-4 py-2 text-sm font-semibold text-gray-700 shadow hover:bg-gray-200 hover:text-blue-700 transition">
        {{ person.short_name }}
      </a>
    </li>
  {% endfor %}
</ul>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const searchInput = document.getElementById('person-search');
  const items = document.querySelectorAll('#people-list li');

  searchInput.addEventListener('input', function() {
    const query = this.value.trim().toLowerCase();
    items.forEach(item => {
      const name = item.getAttribute('data-name');
      if (name.includes(query)) {
        item.style.display = '';
      } else {
        item.style.display = 'none';
      }
    });
  });
});
</script>
