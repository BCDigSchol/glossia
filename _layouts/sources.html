---
layout: page
---

{{ content }}

<input
  type="text"
  id="source-search"
  placeholder="Search sources..."
  style="margin-bottom: 1em; padding: 0.5em; width: 100%; max-width: 400px;"
/>

<ul class="flex flex-wrap gap-3 my-6 list-none" id="sources-list">
  {% assign sorted_sources = site.data.sources | sort: "title" %}
  {% for source in sorted_sources %}
    <li data-name="{{ source.title | downcase }}">
      <a href="/source/{{ source.id }}/"
         class="inline-block bg-gray-100 border border-gray-300 rounded-full px-4 py-2 text-sm font-semibold text-gray-700 shadow hover:bg-gray-200 hover:text-blue-700 transition">
        {{ source.title }}
      </a>
    </li>
  {% endfor %}
</ul>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const searchInput = document.getElementById('source-search');
  const items = document.querySelectorAll('#sources-list li');

  searchInput.addEventListener('input', function() {
    const query = this.value.trim().toLowerCase();
    items.forEach(item => {
      const name = item.getAttribute('data-name');
      if (name.includes(query)) {
        item.style.display = '';
      } else {
        item.style.display = 'none';
      }
    });
  });
});
</script>
