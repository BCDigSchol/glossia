---
layout: page
---

{{ content }}
<input
  type="text"
  id="author-search"
  placeholder="Search authors..."
  style="margin-bottom: 1em; padding: 0.5em; width: 100%; max-width: 400px;"
/>

<ul class="flex flex-wrap gap-3 my-6 list-none item-list-wrap" id="authors-list">
  {% assign sorted_authors = site.data.authors | sort: "short_name" %}
  {% for author in sorted_authors %}
    <li data-name="{{ author.short_name | downcase }}">
      <a href="{{ '/author/' | append: author.id | relative_url }}"
         class="inline-block bg-gray-100 border border-gray-300 rounded-full px-4 py-2 text-sm font-semibold text-gray-700 shadow hover:bg-gray-200 hover:text-blue-700 transition">
        {{ author.short_name }}
      </a>
    </li>
  {% endfor %}
</ul>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const searchInput = document.getElementById('author-search');
  const items = document.querySelectorAll('#authors-list li');

  searchInput.addEventListener('input', function() {
    const query = this.value.trim().toLowerCase();
    items.forEach(item => {
      const name = item.getAttribute('data-name');
      if (name.includes(query)) {
        item.style.display = '';
      } else {
        item.style.display = 'none';
      }
    });
  });
});
</script>
