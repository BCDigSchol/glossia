---
layout: page
---

{{ content }}

<input
  type="text"
  id="author-search"
  placeholder="Search authors..."
  style="margin-bottom: 1em; padding: 0.5em; width: 100%; max-width: 400px;"
/>

<div class="grid grid-cols-3 gap-4" id="authors-grid">
  {% for author in site.data.authors %}
    <div class="grid-item border border-solid rounded-lg text-center" data-name="{{ author.short_name | downcase }}">
      <a href="/author/{{ author.id }}/">
        <h3>{{ author.short_name }}</h3>
      </a>
    </div>
  {% endfor %}
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const searchInput = document.getElementById('author-search');
  const items = document.querySelectorAll('#authors-grid .grid-item');

  searchInput.addEventListener('input', function() {
    const query = this.value.trim().toLowerCase();
    items.forEach(item => {
      const name = item.getAttribute('data-name');
      if (name.includes(query)) {
        item.style.display = '';
      } else {
        item.style.display = 'none';
      }
    });
  });
});
</script>
