---
layout: page
---

{{ content }}

<input
  type="text"
  id="glossary-search"
  placeholder="Search glossary..."
  style="margin-bottom: 1em; padding: 0.5em; width: 100%; max-width: 400px;"
/>

<ul class="list-none flex flex-col gap-3 my-6" id="glossary-list">
  {% assign sorted_glossary = site.data.glossary | sort: "term" %}
  {% for glossary in sorted_glossary %}
    <li class="border border-gray-300 rounded-lg px-4 py-3 shadow transition hover:bg-gray-100 hover:shadow-md"
        data-name="{{ glossary.term | downcase }}">
      <a href="{{ '/glossary/' | append: glossary.id | append: '/' | relative_url }}" class="block text-lg font-semibold text-blue-700 hover:text-blue-900 transition">
        {{ glossary.term }}
      </a>
    </li>
  {% endfor %}
</ul>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const searchInput = document.getElementById('glossary-search');
  const items = document.querySelectorAll('#glossary-list li');

  searchInput.addEventListener('input', function() {
    const query = this.value.trim().toLowerCase();
    items.forEach(item => {
      const name = item.getAttribute('data-name');
      if (name.includes(query)) {
        item.style.display = '';
      } else {
        item.style.display = 'none';
      }
    });
  });
});
</script>
